# PitchVision AI - Pipeline Configuration

# Detection settings
detection:
  model: "yolov8x"
  model_path: "models/yolov8x-football.pt"
  confidence_threshold: 0.5
  iou_threshold: 0.45
  sample_fps: 10
  classes:
    0: player
    1: goalkeeper
    2: referee
    3: ball

# Tracking settings
tracking:
  algorithm: "bytetrack"
  track_activation_threshold: 0.25
  lost_track_buffer: 30
  minimum_matching_threshold: 0.8
  minimum_track_length: 10

# Team classification settings
classification:
  method: "siglip"  # "siglip" or "color_histogram"
  siglip_model: "google/siglip-base-patch16-224"
  umap_components: 5
  kmeans_clusters: 2
  samples_per_track: 10

# Jersey OCR settings
jersey_ocr:
  engine: "paddleocr"
  confidence_threshold: 0.6
  min_crop_height: 40
  max_jersey_number: 99
  temporal_voting_samples: 15
  min_votes: 3

# Event detection settings
event_detection:
  pass_distance_threshold: 5.0
  short_pass_max_distance: 25.0
  long_pass_min_distance: 25.0
  tackle_proximity: 3.0
  duel_proximity: 2.5
  shot_zone_x_min: 80.0

# Pitch mapping
pitch_mapping:
  coordinate_range: [0, 100]  # Normalized range for x and y
  pitch_length_meters: 105
  pitch_width_meters: 68

# Analytics settings
analytics:
  time_interval_minutes: 5
  half_duration_minutes: 45
  pass_progressive_threshold: 10.0  # Units moved forward

# Output settings
output:
  csv_enabled: true
  json_enabled: true
  pdf_enabled: true
  dashboard_enabled: true
  include_x_events: true  # Include X_ (encounter) events
